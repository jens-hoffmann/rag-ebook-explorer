[tox]
minversion = 4.23.0
requires =
    tox-uv>=1.16.0
envlist =
    lint
    type
    unit
    integration

[testenv]
runner = uv-venv-lock-runner
package = wheel
wheel_build_env = .pkg

[testenv:lint]
description = Run ruff linter and formatter
skip_install = true
deps =
    ruff>=0.8.0
commands =
    ruff check src tests
    ruff format --check src tests

[testenv:lint-fix]
description = Fix ruff issues
skip_install = true
deps =
    ruff>=0.8.0
commands =
    ruff check --fix src tests
    ruff format src tests

[testenv:type]
description = Run mypy type checker
deps =
    mypy>=1.13.0
    types-beautifulsoup4
commands =
    mypy src

[testenv:unit]
description = Run unit tests (no external services)
deps =
    pytest>=8.3.0
    pytest-asyncio>=0.24.0
    pytest-httpx>=0.33.0
    httpx>=0.27.0
commands =
    pytest {posargs:tests/unit} -v --tb=short -m "not integration"
setenv =
    PYTHONPATH = {toxinidir}/src
    PYTEST_CURRENT_TEST = 1

[testenv:integration]
description = Run integration tests (requires Podman)
deps =
    pytest>=8.3.0
    pytest-asyncio>=0.24.0
    pytest-httpx>=0.33.0
    httpx>=0.27.0
    testcontainers>=4.8.0
commands =
    pytest {posargs:tests/integration} -v --tb=short
setenv =
    PYTHONPATH = {toxinidir}/src
    # Podman configuration for testcontainers
    TESTCONTAINERS_RYUK_DISABLED = true
    # Adjust DOCKER_HOST based on your Podman setup
    # Linux: unix:///run/user/1000/podman/podman.sock
    # macOS: unix:///Users/{user}/.local/share/containers/podman/machine/podman-machine-default/podman.sock
    # Windows: npipe:////./pipe/podman-machine-default
    DOCKER_HOST = {env:DOCKER_HOST:unix:///run/user/1000/podman/podman.sock}
    # Skip slow tests by default
    PYTEST_CURRENT_TEST = 1

[testenv:all]
description = Run all tests (unit + integration)
deps =
    pytest>=8.3.0
    pytest-asyncio>=0.24.0
    pytest-httpx>=0.33.0
    httpx>=0.27.0
    testcontainers>=4.8.0
commands =
    pytest {posargs:tests} -v --tb=short
setenv =
    PYTHONPATH = {toxinidir}/src
    TESTCONTAINERS_RYUK_DISABLED = true
    DOCKER_HOST = {env:DOCKER_HOST:unix:///run/user/1000/podman/podman.sock}

[testenv:serve]
description = Start the FastAPI development server
deps =
    fastapi>=0.115.0
    uvicorn[standard]>=0.32.0
commands =
    uvicorn ebook_rag_explorer.api.app:create_app --reload --host {env:API_HOST:0.0.0.0} --port {env:API_PORT:8000}
setenv =
    PYTHONPATH = {toxinidir}/src

[testenv:serve-prod]
description = Start the FastAPI production server
commands =
    uvicorn ebook_rag_explorer.api.app:create_app --host {env:API_HOST:0.0.0.0} --port {env:API_PORT:8000} --workers 4
setenv =
    PYTHONPATH = {toxinidir}/src

[testenv:clean]
description = Clean build artifacts
skip_install = true
allowlist_externals =
    rm
commands =
    rm -rf .tox
    rm -rf .pytest_cache
    rm -rf .mypy_cache
    rm -rf .ruff_cache
    rm -rf src/*.egg-info
    rm -rf dist
    rm -rf build
    find . -type d -name __pycache__ -exec rm -rf {} +
    find . -type f -name "*.pyc" -delete

[flake8]
max-line-length = 100
exclude = .tox,build,dist,*.egg,__pycache__,.git

[gh-actions]
python =
    3.13: py313, lint, type, unit
